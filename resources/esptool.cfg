# esptool configuration for WLKATA StudioX
# Tuned for CH340/CH341 USB adapters with extended reset and sync timing
[esptool]
timeout                   = 10
sync_timeout              = 0.5
connect_attempts          = 10
reset_delay               = 0.5
serial_write_timeout      = 15
erase_write_timeout_per_mb = 60
