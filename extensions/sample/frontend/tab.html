<div class="sample-ext">
  <h2 class="sample-ext-title">Sample Jog</h2>
  <p class="sample-ext-desc">
    Move <strong>all</strong> connected robotic arms along the X axis.
  </p>

  <div class="sample-ext-step-row">
    <label>Step (mm)</label>
    <input id="sample-step" type="number" value="5" min="0.1" max="100" step="0.5" />
  </div>

  <div class="sample-ext-arrows">
    <button id="sample-back" class="sample-arrow-btn" title="Move -X (backward)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>-X</span>
    </button>
    <button id="sample-forward" class="sample-arrow-btn" title="Move +X (forward)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
      <span>+X</span>
    </button>
  </div>

  <div id="sample-status" class="sample-ext-status"></div>
</div>
