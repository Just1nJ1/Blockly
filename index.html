<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blockly Desktop App</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/ui/theme.js"></script>
</head>
<body>
  <div id="app">
    <!-- Left sidebar for top-level tab switching -->
    <div id="sidebar">
      <div class="sidebar-tab active" data-tab="command" title="Command">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        <span>Command</span>
      </div>
      <div class="sidebar-tab" data-tab="blockly" title="Blockly">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
        <span>Blockly</span>
      </div>
      <div class="sidebar-tab disabled" title="Teaching">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
        <span>Teaching</span>
      </div>
      <div class="sidebar-tab disabled" title="Drawing">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
        <span>Drawing</span>
      </div>
      <button id="settings-btn" class="sidebar-bottom-btn" title="Settings" onclick="if(typeof openSettings==='function')openSettings();">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button id="theme-toggle" title="Toggle theme"></button>
    </div>

    <!-- Main content area (right of sidebar) -->
    <div id="app-content">

      <!-- ═══ Command View ═══ -->
      <div id="command-view" class="app-view active">
        <div id="command-toolbar">
          <select id="command-port-select">
            <option value="" disabled selected>No Connection</option>
            <option value="__manual__">Connect manually...</option>
          </select>
          <button id="command-port-remove" title="Remove manual port">✕</button>
          <button id="command-clear-btn" title="Clear screen">Clear</button>
        </div>
        <div id="command-output"></div>
        <div id="command-input-bar">
          <input type="text" id="command-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
        </div>
      </div>

      <!-- ═══ Blockly View ═══ -->
      <div id="blockly-view" class="app-view">
        <div id="toolbar">
          <span id="workspace-name-indicator" title="Current workspace" style="font-weight:600;font-size:14px;color:var(--text-primary);padding:0 8px;cursor:pointer;border-right:1px solid var(--border-primary);margin-right:4px;" onclick="switchWorkspace()"></span>
          <button id="saveBtn" onclick="saveWorkspaceBlocks()" title="Save workspace (Ctrl+S)">💾 Save</button>
          <button id="runBtn" onclick="runCode()">▶ Run</button>
          <button id="debugBtn" onclick="debugStart()">⏯ Step Run</button>
          <button id="stepBtn" class="debug-btn" onclick="debugStep()">⏭ Step</button>
          <button id="continueBtn" class="debug-btn" onclick="debugContinue()">▶ Continue</button>
          <button id="stopDebugBtn" class="debug-btn" onclick="debugStop()">⏹ Stop</button>
          <button id="runSelectedBtn" onclick="runSelectedBlocks()" title="Run selected blocks (Cmd+Shift+Enter)">▶ Run Selected</button>
          <button id="clearBtn" onclick="clearWorkspace()">Clear Workspace</button>
          <button id="exportBtn" onclick="exportBlocks()">Export Blocks</button>
          <button id="importBtn" onclick="importBlocks()">Import Blocks</button>
          <span style="flex:1;"></span>
          <button id="stopAllBtn" onclick="stopAllRobots()" style="background:#f44336;font-weight:700;">STOP</button>
        </div>

        <!-- Top-level view tabs: Blockly + dynamic robot variable tabs -->
        <div id="view-tabs">
          <button class="view-tab-btn active" data-view="workspace">Blockly</button>
          <!-- Robot variable tabs are added dynamically based on code -->
        </div>

        <div id="main-container">
          <!-- Workspace mode: Blockly editor + output panel -->
          <div id="workspace-area">
            <div id="blocklyDiv"></div>
            <div id="output-panel">
              <!-- Tabs for right panel -->
              <div id="output-tabs">
                <button class="panel-tab-btn active" data-panel="code-output">Code & Output</button>
                <button class="panel-tab-btn" data-panel="saved-functions">Saved Functions</button>
                <button class="panel-tab-btn" data-panel="control-panel">Control</button>
              </div>

              <!-- Tab 1: Code & Output (default) -->
              <div id="panel-content-code-output" class="panel-tab-content active">
                <div id="output-header">Generated Python Code</div>
                <div id="code-preview"></div>
                <div id="output-header">Output</div>
                <div id="output-content"></div>
                <!-- Debug panel: variables + call stack (shown during debug sessions) -->
                <div id="debug-panel">
                  <div id="debug-panel-header">
                    <span>Variables</span>
                    <span class="debug-line-info" id="debug-line-info"></span>
                  </div>
                  <div id="debug-variables"></div>
                  <div id="debug-callstack"></div>
                </div>
              </div>

              <!-- Tab 2: Saved Functions -->
              <div id="panel-content-saved-functions" class="panel-tab-content">
                <div id="saved-functions-list"></div>
              </div>

              <!-- Tab 3: Control Panel -->
              <div id="panel-content-control-panel" class="panel-tab-content">
                <div class="ctrl-panel">
                  <!-- Port selector -->
                  <div class="ctrl-port-row">
                    <span class="ctrl-joint-label">Port</span>
                    <select id="ctrl-port-select">
                      <option value="" disabled selected>No Connection</option>
                    </select>
                  </div>

                  <!-- Home / Zero buttons -->
                  <div class="ctrl-action-row">
                    <button class="ctrl-action-btn ctrl-btn-home" id="ctrl-home-btn">Home</button>
                    <button class="ctrl-action-btn ctrl-btn-zero" id="ctrl-zero-btn">Zero Pos</button>
                  </div>

                  <!-- Mode toggle: Joint / Coordinate -->
                  <div class="ctrl-mode-toggle">
                    <span class="ctrl-mode-label ctrl-mode-active" data-mode="joint">Joint</span>
                    <div class="ctrl-toggle-track" id="ctrl-mode-switch">
                      <div class="ctrl-toggle-thumb"></div>
                    </div>
                    <span class="ctrl-mode-label" data-mode="coord">Coordinate</span>
                  </div>

                  <!-- Dynamic axis rows (populated by JS) -->
                  <div id="ctrl-axis-rows"></div>

                  <!-- Capture position button -->
                  <div class="ctrl-action-row">
                    <button class="ctrl-action-btn" id="ctrl-capture-btn" style="background:#4CAF50;color:#fff;border-color:#388E3C;">Capture Position</button>
                  </div>

                  <!-- Step size -->
                  <div class="ctrl-step-row">
                    <span class="ctrl-joint-label">Step</span>
                    <button class="ctrl-step-btn ctrl-step-preset" data-step="1">1</button>
                    <button class="ctrl-step-btn ctrl-step-preset" data-step="5">5</button>
                    <button class="ctrl-step-btn ctrl-step-preset active" data-step="10">10</button>
                    <button class="ctrl-step-btn ctrl-step-preset" data-step="15">15</button>
                    <input type="number" class="ctrl-step-input" value="10" min="1" step="1">
                  </div>

                  <!-- End effector divider -->
                  <div class="ctrl-divider">
                    <span>END EFFECTOR CONTROL</span>
                  </div>

                  <!-- End effector selector + dynamic buttons -->
                  <div class="ctrl-effector-row">
                    <select id="ctrl-effector-select">
                      <option value="none">None</option>
                      <option value="suction">Suction Cup</option>
                      <option value="gripper">Gripper</option>
                      <option value="soft">Soft Gripper</option>
                    </select>
                  </div>
                  <div id="ctrl-effector-buttons"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Model mode: full-size 3D viewer (scene created lazily on tab click) -->
          <div id="model-area" style="position:relative;">
            <!-- progress bars are created per-variable in createModelScene -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- A-Frame for 3D Model Viewer -->
  <script src="resources/6dof/aframe.min.js"></script>
  <script src="js/robotViewer/aframeComponents.js"></script>

  <!-- Blockly -->
  <script src="./node_modules/blockly/blockly_compressed.js"></script>
  <script src="./node_modules/blockly/blocks_compressed.js"></script>
  <script src="./node_modules/blockly/python_compressed.js"></script>
  <script src="./node_modules/blockly/msg/en.js"></script>

  <!-- Configuration -->
  <script src="js/config.js"></script>

  <!-- Block Definitions -->
  <script src="js/blocks/importModule.js"></script>
  <script src="js/blocks/raw.js"></script>
  <script src="js/blocks/functionCall.js"></script>
  <script src="js/blocks/libraryFunctionCall.js"></script>
  <script src="js/blocks/instanceFunctionCall.js"></script>
  <script src="js/blocks/functionParam.js"></script>
  <script src="js/blocks/setupRobot.js"></script>
  <script src="js/blocks/moveRobot.js"></script>
  <script src="js/blocks/index.js"></script>

  <!-- Code Generators -->
  <script src="js/generators/python.js"></script>

  <!-- UI Components -->
  <script src="js/ui/dialogs.js"></script>
  <script src="js/ui/toolbox.js"></script>
  <script src="js/ui/sidebar.js"></script>
  <script src="js/ui/commandTab.js"></script>
  <script src="js/ui/controlPanel.js"></script>

  <!-- Workspace Features -->
  <script src="js/workspace/instanceMethods.js"></script>
  <script src="js/workspace/codePreview.js"></script>
  <script src="js/workspace/execution.js"></script>
  <script src="js/workspace/debugExecution.js"></script>
  <script src="js/workspace/workspaceManager.js"></script>
  <script src="js/workspace/savedFunctions.js"></script>
  <script src="js/workspace/importExport.js"></script>
  <script src="js/workspace/management.js"></script>
  <script src="js/workspace/blockSelection.js"></script>

  <!-- Main Entry Point -->
  <script src="js/main.js"></script>

  <!-- Device Detector -->
  <script src="js/robotViewer/deviceDetector.js"></script>

  <!-- Robot Viewer: Code Analysis, Animation, View Tabs -->
  <script src="js/robotViewer/codeAnalysis.js"></script>
  <script src="js/robotViewer/animation.js"></script>
  <script src="js/robotViewer/viewTabs.js"></script>
</body>
</html>
