<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blockly Desktop App</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #toolbar {
      background: #f0f0f0;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      cursor: pointer;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    button:hover {
      background: #1976D2;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #blocklyDiv {
      flex: 1;
    }
    #output-panel {
      width: 350px;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }
    #output-header {
      padding: 10px;
      background: #e0e0e0;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
    }
    #code-preview {
      height: 150px;
      overflow: auto;
      padding: 10px;
      background: #263238;
      color: #aed581;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #output-content {
      flex: 1;
      overflow: auto;
      padding: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }
    .output-line {
      margin: 2px 0;
      padding: 4px;
      border-radius: 3px;
    }
    .output-stdout {
      color: #333;
    }
    .output-stderr {
      color: #d32f2f;
      background: #ffebee;
    }
    .output-result {
      color: #1976D2;
      background: #e3f2fd;
    }
    .output-error {
      color: #d32f2f;
      background: #ffebee;
      padding: 8px;
      margin: 4px 0;
      border-radius: 4px;
    }
    /* View tabs (top-level: Blockly | Model) */
    #view-tabs {
      display: flex;
      background: #e0e0e0;
      border-bottom: 1px solid #ccc;
    }
    .view-tab-btn {
      flex: 1;
      padding: 12px 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      border-bottom: 3px solid transparent;
    }
    .view-tab-btn:hover {
      background: #d5d5d5;
    }
    .view-tab-btn.active {
      background: #fff;
      color: #2196F3;
      border-bottom-color: #2196F3;
    }
    /* Workspace mode (Blockly + output panel) */
    #workspace-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #workspace-area.hidden {
      display: none;
    }
    /* Model mode (full-size 3D viewer) */
    #model-area {
      display: flex;
      flex: 0;
      background: #1a1a1a;
      overflow: hidden;
      /* border: 4px solid #ff6600;  /* DEBUG: visible orange border */
      visibility: hidden;  /* hidden until Model tab clicked */
    }
    #model-area.visible {
      flex: 1;
      visibility: visible;
    }
    #model-area a-scene {
      width: 100%;
      height: 100%;
    }
    /* Animation progress bar */
    .anim-progress {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .anim-progress-label {
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .anim-progress-track {
      width: 260px;
      height: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .anim-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: none;
    }
    /* Debug mode: gray out all blocks, disable interaction */
    #blocklyDiv.debug-mode .blocklyBlockCanvas .blocklyPath {
      fill-opacity: 0.25 !important;
      stroke-opacity: 0.25 !important;
    }
    #blocklyDiv.debug-mode .blocklyBlockCanvas .blocklyText {
      opacity: 0.25 !important;
    }
    #blocklyDiv.debug-mode .blocklyBlockCanvas .blocklyEditableField > rect {
      fill-opacity: 0.25 !important;
    }
    /* Only the active block (and its value inputs) stay fully visible */
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > .blocklyPath {
      fill-opacity: 1 !important;
      stroke-opacity: 1 !important;
    }
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > .blocklyEditableField > rect,
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > .blocklyNonEditableField > rect {
      fill-opacity: 1 !important;
    }
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > text.blocklyText,
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > g > text.blocklyText,
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > .blocklyEditableField > text,
    #blocklyDiv.debug-mode .blocklyBlockCanvas .debug-active > .blocklyNonEditableField > text {
      opacity: 1 !important;
    }
    /* Disable pointer events on the workspace during debug */
    #blocklyDiv.debug-mode .blocklyBlockCanvas {
      pointer-events: none;
    }
    #blocklyDiv.debug-mode .blocklyToolboxDiv {
      pointer-events: none;
      opacity: 0.4;
    }
    #blocklyDiv.debug-mode .blocklyFlyout {
      pointer-events: none;
      opacity: 0.4;
    }
    #blocklyDiv.debug-mode .blocklyTrash {
      pointer-events: none;
      opacity: 0.3;
    }
    /* Subtle background tint to reinforce locked state */
    #blocklyDiv.debug-mode .blocklyMainBackground {
      fill: #e8e8e8 !important;
    }

    /* Debug toolbar buttons */
    .debug-btn {
      background: #607D8B;
      display: none;
    }
    .debug-btn:hover {
      background: #455A64;
    }
    .debug-btn.visible {
      display: inline-block;
    }
    #stepBtn { background: #FF9800; }
    #stepBtn:hover { background: #F57C00; }
    #continueBtn { background: #4CAF50; }
    #continueBtn:hover { background: #388E3C; }
    #stopDebugBtn { background: #f44336; }
    #stopDebugBtn:hover { background: #d32f2f; }

    /* Debug variables panel */
    #debug-panel {
      display: none;
      flex-direction: column;
      border-top: 1px solid #ccc;
      max-height: 50%;
      overflow: hidden;
    }
    #debug-panel.active {
      display: flex;
    }
    #debug-panel-header {
      padding: 8px 10px;
      background: #e8eaf6;
      font-weight: bold;
      font-size: 13px;
      color: #283593;
      border-bottom: 1px solid #c5cae9;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #debug-panel-header .debug-line-info {
      font-weight: normal;
      font-size: 12px;
      color: #5c6bc0;
    }
    #debug-variables {
      flex: 1;
      overflow: auto;
      padding: 6px 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
    }
    .debug-var-row {
      display: flex;
      padding: 3px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .debug-var-name {
      color: #1565C0;
      font-weight: bold;
      min-width: 80px;
      margin-right: 8px;
    }
    .debug-var-value {
      color: #333;
      flex: 1;
      word-break: break-all;
    }
    .debug-var-type {
      color: #999;
      font-size: 11px;
      margin-left: 6px;
    }
    #debug-callstack {
      padding: 6px 10px;
      border-top: 1px solid #e0e0e0;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      color: #666;
      max-height: 80px;
      overflow: auto;
    }
    .callstack-frame {
      padding: 2px 0;
    }
    .callstack-frame.current {
      color: #1565C0;
      font-weight: bold;
    }

    /* Output panel tabs (Code/Output only) */
    #output-tabs {
      display: flex;
      background: #e0e0e0;
      border-bottom: 1px solid #ccc;
    }
    .panel-tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      border-bottom: 2px solid transparent;
    }
    .panel-tab-btn:hover {
      background: #d5d5d5;
    }
    .panel-tab-btn.active {
      background: #fafafa;
      color: #2196F3;
      border-bottom-color: #2196F3;
    }
    .panel-tab-content {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .panel-tab-content.active {
      display: flex;
    }

    /* Saved Functions panel */
    #saved-functions-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .saved-func-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: grab;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .saved-func-card:hover {
      border-color: #2196F3;
      box-shadow: 0 2px 8px rgba(33,150,243,0.15);
    }
    .saved-func-card:active {
      cursor: grabbing;
    }
    .saved-func-card .func-name {
      font-weight: 600;
      font-size: 14px;
      color: #333;
    }
    .saved-func-card .func-params {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .saved-func-card .func-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
    }
    .saved-func-card .func-actions button {
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 3px;
      background: #eee;
      color: #555;
      border: 1px solid #ccc;
      cursor: pointer;
    }
    .saved-func-card .func-actions button:hover {
      background: #ddd;
    }
    .saved-func-card .func-actions .delete-btn:hover {
      background: #ffebee;
      color: #d32f2f;
      border-color: #ef9a9a;
    }
    .saved-func-empty {
      text-align: center;
      color: #999;
      padding: 30px 10px;
      font-size: 13px;
    }
    /* Workspace group headers in Saved Functions */
    .saved-func-group {
      margin-bottom: 4px;
    }
    .saved-func-group-header {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #e8eaf6;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: #37474f;
      gap: 6px;
    }
    .saved-func-group-header:hover {
      background: #c5cae9;
    }
    .saved-func-group-header.current {
      background: #bbdefb;
      color: #0d47a1;
    }
    .saved-func-group-header .group-toggle {
      font-size: 10px;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .saved-func-group-header .group-name {
      flex: 1;
    }
    .saved-func-group-header .group-badge {
      font-size: 10px;
      background: #2196F3;
      color: #fff;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 500;
    }
    .saved-func-group-header .group-count {
      font-size: 11px;
      color: #999;
      background: #f0f0f0;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .saved-func-group-cards {
      padding: 4px 0 4px 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span id="workspace-name-indicator" title="Current workspace" style="font-weight:600;font-size:14px;color:#333;padding:0 8px;cursor:pointer;border-right:1px solid #ccc;margin-right:4px;" onclick="switchWorkspace()"></span>
      <button id="saveBtn" onclick="saveWorkspaceBlocks()" title="Save workspace (Ctrl+S)">💾 Save</button>
      <button id="runBtn" onclick="runCode()">▶ Run</button>
      <button id="debugBtn" onclick="debugStart()">⏯ Step Run</button>
      <button id="stepBtn" class="debug-btn" onclick="debugStep()">⏭ Step</button>
      <button id="continueBtn" class="debug-btn" onclick="debugContinue()">▶ Continue</button>
      <button id="stopDebugBtn" class="debug-btn" onclick="debugStop()">⏹ Stop</button>
      <button id="clearBtn" onclick="clearWorkspace()">Clear Workspace</button>
      <button id="exportBtn" onclick="exportBlocks()">Export Blocks</button>
      <button id="importBtn" onclick="importBlocks()">Import Blocks</button>
    </div>

    <!-- Top-level view tabs: Blockly + dynamic robot variable tabs -->
    <div id="view-tabs">
      <button class="view-tab-btn active" data-view="workspace">Blockly</button>
      <!-- Robot variable tabs are added dynamically based on code -->
    </div>

    <div id="main-container">
      <!-- Workspace mode: Blockly editor + output panel -->
      <div id="workspace-area">
        <div id="blocklyDiv"></div>
        <div id="output-panel">
          <!-- Tabs for right panel -->
          <div id="output-tabs">
            <button class="panel-tab-btn active" data-panel="code-output">Code & Output</button>
            <button class="panel-tab-btn" data-panel="saved-functions">Saved Functions</button>
          </div>

          <!-- Tab 1: Code & Output (default) -->
          <div id="panel-content-code-output" class="panel-tab-content active">
            <div id="output-header">Generated Python Code</div>
            <div id="code-preview"></div>
            <div id="output-header">Output</div>
            <div id="output-content"></div>
            <!-- Debug panel: variables + call stack (shown during debug sessions) -->
            <div id="debug-panel">
              <div id="debug-panel-header">
                <span>Variables</span>
                <span class="debug-line-info" id="debug-line-info"></span>
              </div>
              <div id="debug-variables"></div>
              <div id="debug-callstack"></div>
            </div>
          </div>

          <!-- Tab 2: Saved Functions -->
          <div id="panel-content-saved-functions" class="panel-tab-content">
            <div id="saved-functions-list"></div>
          </div>
        </div>
      </div>

      <!-- Model mode: full-size 3D viewer (scene created lazily on tab click) -->
      <div id="model-area" style="position:relative;">
        <!-- progress bars are created per-variable in createModelScene -->
      </div>
    </div>
  </div>

  <!-- A-Frame for 3D Model Viewer -->
  <script src="resources/6dof/aframe.min.js"></script>
  <script>
    // Custom A-Frame component to load GLTF with translucent material
    AFRAME.registerComponent("translucent-gltf", {
      schema: {
        src: { type: "string" },
        color: { type: "color", default: "#fff" },
        scale: { type: "string", default: "20 20 20" }
      },
      init() {
        const loader = new THREE.GLTFLoader();
        loader.load(this.data.src, gltf => {
          gltf.scene.traverse(node => {
            if (node.isMesh && node.material) {
              node.material.color.set(this.data.color);
              node.material.transparent = true;
              node.material.opacity = 0.5;
            }
          });
          const [sx, sy, sz] = this.data.scale.split(" ").map(parseFloat);
          gltf.scene.scale.set(sx, sy, sz);
          gltf.scene.position.set(0, 0, 0);
          gltf.scene.rotation.set(0, 0, 0);
          this.el.setObject3D("mesh", gltf.scene);
        }, null, err => console.error("GLTF load error:", err));
      },
      remove() {
        if (this.el.getObject3D("mesh")) {
          this.el.removeObject3D("mesh");
        }
      }
    });
  </script>

  <!-- View & Panel Tab Switching -->
  <script>
    (function() {
      // --- Top-level View Tabs (Blockly | Model) ---
      const viewBtns = document.querySelectorAll('.view-tab-btn');
      const workspaceArea = document.getElementById('workspace-area');
      const modelArea = document.getElementById('model-area');
      // (per-variable progress bars are created in createModelScene)

      viewBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const view = btn.dataset.view;

          // Update button active states
          viewBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          if (view === 'workspace') {
            // Show workspace, hide model
            workspaceArea.style.display = 'flex';
            workspaceArea.style.visibility = 'visible';
            modelArea.classList.remove('visible');
            console.log('[View] Switched to Blockly workspace');
            // Pause current variable's animation
            if (currentVariableName && typeof pauseVarAnimation === 'function') pauseVarAnimation(currentVariableName);
            // Fix: Blockly needs resize after container was hidden
            if (typeof getWorkspace === 'function' && typeof Blockly !== 'undefined') {
              Blockly.svgResize(getWorkspace());
            }
          }
          // (Removed: old static "Model" tab handler - replaced by dynamic var: tabs)
        });
      });

      // --- Dynamic Robot Variable Tabs ---
      // Parses generated code for robot variable assignments and updates view tabs
      let currentRobotVars = []; // track current variable names

      // --- Code analysis helpers ---
      // Parse the generated Python code into structural info:
      //   - which variables are direct Mirobot_UART assignments at top level
      //   - which functions internally create Mirobot_UART and return it
      //   - which variables are assigned from calling those functions
      function analyzeRobotCode(code) {
        const lines = code.split('\n');
        const result = {
          directVars: [],          // top-level: x = wlkatapython.Mirobot_UART(...)
          funcReturnVars: [],      // top-level: b = getMirobot()
          // Map: funcName -> { internalVar, bodyLines[] }
          robotFunctions: {},
          // Map: callerVar -> funcName
          callerToFunc: {}
        };

        // Phase 1: Identify functions that create Mirobot_UART internally and return it
        let inFunc = null;   // current function name
        let funcIndent = 0;  // indentation level of the def line
        let funcBodyLines = [];
        let funcInternalVar = null;
        let funcReturnsRobot = false; // does the function return the robot variable?

        // Helper to save a completed function if it creates AND returns a robot
        function saveFunc() {
          if (inFunc && funcInternalVar && funcReturnsRobot) {
            result.robotFunctions[inFunc] = {
              internalVar: funcInternalVar,
              bodyLines: funcBodyLines.slice()
            };
          }
        }

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();

          // Detect function definition
          const defMatch = trimmed.match(/^def\s+(\w+)\s*\(/);
          if (defMatch) {
            // Save previous function if it had a robot that is returned
            saveFunc();
            inFunc = defMatch[1];
            funcIndent = line.search(/\S/); // indentation of 'def'
            funcBodyLines = [];
            funcInternalVar = null;
            funcReturnsRobot = false;
            continue;
          }

          // If we're inside a function
          if (inFunc !== null) {
            const lineIndent = line.search(/\S/);
            // Check if we've left the function (non-empty line at same or lower indent)
            if (trimmed.length > 0 && lineIndent <= funcIndent) {
              // Save previous function if it creates and returns a robot
              saveFunc();
              inFunc = null;
              funcBodyLines = [];
              funcInternalVar = null;
              funcReturnsRobot = false;
              // Fall through to check this line as top-level
            } else {
              // Still inside function body
              funcBodyLines.push(trimmed);
              // Check for Mirobot_UART assignment inside function
              const innerAssign = trimmed.match(/^(\w+)\s*=\s*wlkatapython\.Mirobot_UART\s*\(/);
              if (innerAssign) {
                funcInternalVar = innerAssign[1];
              }
              // Check for "return <internalVar>" statement
              if (funcInternalVar) {
                const retMatch = trimmed.match(/^return\s+(\w+)/);
                if (retMatch && retMatch[1] === funcInternalVar) {
                  funcReturnsRobot = true;
                }
              }
              continue;
            }
          }

          // Top-level lines (not inside any function)
          // Direct assignment: robot = wlkatapython.Mirobot_UART(...)
          const directMatch = trimmed.match(/^(\w+)\s*=\s*wlkatapython\.Mirobot_UART\s*\(/);
          if (directMatch) {
            result.directVars.push(directMatch[1]);
            continue;
          }

          // Function-return assignment: b = getMirobot()
          const callMatch = trimmed.match(/^(\w+)\s*=\s*(\w+)\s*\(/);
          if (callMatch) {
            const varName = callMatch[1];
            const funcName = callMatch[2];
            // We'll check later if funcName is a robot-returning function
            // For now, store the candidate
            result.callerToFunc[varName] = funcName;
          }
        }

        // Save last function if it creates and returns a robot
        saveFunc();

        // Phase 2: Filter callerToFunc to only include calls to robot-returning functions
        for (const [varName, funcName] of Object.entries(result.callerToFunc)) {
          if (result.robotFunctions[funcName]) {
            result.funcReturnVars.push(varName);
          }
        }
        // Remove non-robot callers
        for (const varName of Object.keys(result.callerToFunc)) {
          if (!result.robotFunctions[result.callerToFunc[varName]]) {
            delete result.callerToFunc[varName];
          }
        }

        return result;
      }

      // Cache the analysis result so parseMovesFromCode can use it
      let lastAnalysis = null;

      function updateRobotTabs() {
        const codeEl = document.getElementById('code-preview');
        if (!codeEl) return;
        const code = codeEl.textContent || '';

        // Analyze the code structure
        const analysis = analyzeRobotCode(code);
        lastAnalysis = analysis;

        // Combine direct top-level vars + function-return vars
        const uniqueVars = [...new Set([...analysis.directVars, ...analysis.funcReturnVars])];

        currentRobotVars = uniqueVars;

        // Rebuild view-tabs: always have Blockly, then one per variable
        const viewTabs = document.getElementById('view-tabs');
        if (!viewTabs) return;

        // Remember which tab is currently active before rebuilding
        const activeBtn = viewTabs.querySelector('.view-tab-btn.active');
        const activeView = activeBtn ? activeBtn.dataset.view : 'workspace';

        // Keep Blockly button, remove others
        viewTabs.innerHTML = '';
        const blocklyBtn = document.createElement('button');
        blocklyBtn.className = 'view-tab-btn' + (activeView === 'workspace' ? ' active' : '');
        blocklyBtn.dataset.view = 'workspace';
        blocklyBtn.textContent = 'Blockly';
        viewTabs.appendChild(blocklyBtn);

        // Add one button per detected variable
        uniqueVars.forEach(varName => {
          const btn = document.createElement('button');
          const viewKey = 'var:' + varName;
          btn.className = 'view-tab-btn' + (activeView === viewKey ? ' active' : '');
          btn.dataset.view = viewKey;
          btn.textContent = varName;
          viewTabs.appendChild(btn);
        });

        // Re-attach click handlers to all view-tab-btns
        attachViewTabHandlers();

        console.log('[RobotTabs] Detected variables:', uniqueVars,
          '| direct:', analysis.directVars,
          '| funcReturn:', analysis.funcReturnVars,
          '| robotFuncs:', Object.keys(analysis.robotFunctions));
      }

      // Re-attach view tab click handlers (called after rebuilding tabs)
      function attachViewTabHandlers() {
        const btns = document.querySelectorAll('.view-tab-btn');
        btns.forEach(btn => {
          // Remove old listener by cloning
          const newBtn = btn.cloneNode(true);
          btn.parentNode.replaceChild(newBtn, btn);
          newBtn.addEventListener('click', () => handleViewTabClick(newBtn));
        });
      }

      // Create the 3D model scene programmatically (one per variable)
      function createModelScene(variableName) {
        // If scene already exists for this variable, return it
        if (scenes[variableName]) {
          console.log('[A-Frame] Scene already exists for variable:', variableName);
          return scenes[variableName];
        }

        // Create a new scene for this variable
        const scene = document.createElement('a-scene');
        scene.id = 'model-scene-' + variableName;
        scene.setAttribute('embedded', '');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        scene.setAttribute('background', 'color: #1a1a1a');
        // Initially hidden - will be shown when this variable's tab is active
        scene.style.display = 'none';

        const createEl = (tag, attrs) => {
          const el = document.createElement(tag);
          for (const [k, v] of Object.entries(attrs)) {
            if (k === 'children') v.forEach(c => el.appendChild(c));
            else el.setAttribute(k, v);
          }
          return el;
        };

        scene.appendChild(createEl('a-entity', { light: 'type:ambient; color:#ccc; intensity:0.6' }));
        scene.appendChild(createEl('a-entity', { light: 'type:directional; color:#fff; intensity:0.8', position: '5 10 5' }));
        scene.appendChild(createEl('a-camera', { position: '3 1.5 6', 'look-controls': 'enabled: false' }));

        const presetBase = {
          "pivot0":  {posX:0,   posY:-0.2,  posZ:0,    rotX:0,   rotY:-5,   rotZ:0},
          "model0":  {posX:0,   posY:0.5,   posZ:0,    rotX:0,   rotY:0,    rotZ:0},
          "pivot1":  {posX:0,   posY:0.5,   posZ:0,    rotX:0,   rotY:0,    rotZ:0},
          "model1":  {posX:0,   posY:0,     posZ:0,    rotX:-90, rotY:0,    rotZ:0},
          "pivot2":  {posX:0.6, posY:-0.3,  posZ:1.2,  rotX:-90, rotY:0,    rotZ:-90},
          "model2":  {posX:0,   posY:0,     posZ:0,    rotX:0,   rotY:0,    rotZ:0},
          "pivot3":  {posX:2.15,posY:0,     posZ:-0.2, rotX:0,   rotY:0,    rotZ:0},
          "model3":  {posX:0.1, posY:0,     posZ:0,    rotX:0,   rotY:0,    rotZ:0},
          "pivot4":  {posX:0.4, posY:2.25,  posZ:0.625,rotX:0,   rotY:0,    rotZ:0},
          "model4":  {posX:0,   posY:-0.1,  posZ:0,    rotX:-90, rotY:0,    rotZ:0},
          "pivot5":  {posX:0,   posY:0,     posZ:1.2,  rotX:-90, rotY:0,    rotZ:0},
          "model5":  {posX:0,   posY:0,     posZ:-0.2, rotX:0,   rotY:0,    rotZ:0},
          "pivot6":  {posX:0,   posY:0,     posZ:0.2,  rotX:-90, rotY:0,    rotZ:0},
          "model6":  {posX:0,   posY:0,     posZ:-0.3, rotX:0,   rotY:0,    rotZ:0}
        };
        const applyPreset = (el, id) => {
          const p = presetBase[id];
          if (p) { el.setAttribute('position', `${p.posX} ${p.posY} ${p.posZ}`); el.setAttribute('rotation', `${p.rotX} ${p.rotY} ${p.rotZ}`); }
        };

        const pivot0 = createEl('a-entity', { id: 'pivot0' });
        applyPreset(pivot0, 'pivot0');
        const model0 = createEl('a-entity', { id: 'model0' });
        applyPreset(model0, 'model0');
        model0.appendChild(createEl('a-cylinder', { color: '#888', height: '1', radius: '0.2', material: 'opacity:0.5; transparent:true' }));

        const linkColors = ['red', 'green', 'blue', 'yellow', 'magenta', 'cyan'];
        let current = model0;
        for (let i = 1; i <= 6; i++) {
          const pivotId = `pivot${i}`, modelId = `model${i}`;
          const pivot = createEl('a-entity', { id: pivotId });
          applyPreset(pivot, pivotId);
          const model = createEl('a-entity', { id: modelId });
          applyPreset(model, modelId);
          const link = createEl('a-entity', { 'translucent-gltf': `src:resources/6dof/Mirobot-GLB/Link${i}.glb; color:${linkColors[i-1]}; scale:20 20 20` });
          model.appendChild(link);
          pivot.appendChild(model);
          current.appendChild(pivot);
          current = model;
        }
        pivot0.appendChild(model0);
        scene.appendChild(pivot0);
        modelArea.appendChild(scene);

        // Store scene and initialize state for this variable
        scenes[variableName] = scene;
        const state = getVariableState(variableName);
        state.scene = scene;
        state.moveIndex = 0;
        state.pausedState = null;

        // Create per-variable progress bar
        const progressEl = document.createElement('div');
        progressEl.className = 'anim-progress';
        progressEl.innerHTML =
          '<div class="anim-progress-label"></div>' +
          '<div class="anim-progress-track"><div class="anim-progress-fill"></div></div>';
        progressEl.style.display = 'none';
        modelArea.appendChild(progressEl);
        state.progressEl = progressEl;
        state.progressLabel = progressEl.querySelector('.anim-progress-label');
        state.progressFill = progressEl.querySelector('.anim-progress-fill');

        console.log('[A-Frame] Scene created for variable tab:', variableName);

        // After scene is loaded, start animation
        setTimeout(() => {
          startVarAnimation(variableName, null);
        }, 500);

        return scene;
      }

      // Extract moves from an array of code lines for a given variable name
      function extractMovesFromLines(lines, varName) {
        const moves = [];
        let varPattern = null;
        if (varName) {
          const escapedVar = varName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          varPattern = new RegExp('(^|\\W)' + escapedVar + '\\.');
        }

        for (const line of lines) {
          const trimmed = (typeof line === 'string') ? line.trim() : '';
          if (varPattern && !varPattern.test(trimmed)) continue;

          // homing() -> all axes 0
          if (/\.homing\s*\(/.test(trimmed)) {
            moves.push({ Axis1: 0, Axis2: 0, Axis3: 0, Axis4: 0, Axis5: 0, type: 'homing' });
          }

          // writeangle(0, a, b, c, d, e, f) -> axes 1-5 are indices 1-5
          const wa = trimmed.match(/\.writeangle\s*\(\s*([^)]+)\s*\)/);
          if (wa) {
            const args = wa[1].split(',').map(s => parseFloat(s.trim()) || 0);
            moves.push({
              Axis1: args[1] || 0,
              Axis2: args[2] || 0,
              Axis3: args[3] || 0,
              Axis4: args[4] || 0,
              Axis5: args[5] || 0,
              type: 'writeangle'
            });
          }

          // writecoordinate / set_wrist_pose / p2p_interpolation with coordinate args
          const wc = trimmed.match(/\.(writecoordinate|set_wrist_pose|p2p_interpolation)\s*\(\s*([^)]+)\s*\)/);
          if (wc) {
            const args = wc[2].split(',').map(s => parseFloat(s.trim()) || 0);
            moves.push({
              Axis1: args[0] || 0,
              Axis2: args[1] || 0,
              Axis3: args[2] || 0,
              Axis4: args[3] || 0,
              Axis5: args[4] || 0,
              type: wc[1]
            });
          }
        }
        return moves;
      }

      // Parse code to extract move sequence for a specific variable.
      // For function-return variables (b = getMirobot()), inlines the function body moves
      // before the variable's own top-level moves.
      function parseMovesFromCode(variableName) {
        const codeEl = document.getElementById('code-preview');
        if (!codeEl) return [];
        const code = codeEl.textContent || '';
        const allLines = code.split('\n');

        // Use cached analysis if available, otherwise re-analyze
        const analysis = lastAnalysis || analyzeRobotCode(code);

        const moves = [];

        // Check if this variable was assigned from a robot-returning function
        if (variableName && analysis.callerToFunc[variableName]) {
          const funcName = analysis.callerToFunc[variableName];
          const funcInfo = analysis.robotFunctions[funcName];
          if (funcInfo) {
            // Inline the function body moves (using the internal variable name)
            const bodyMoves = extractMovesFromLines(funcInfo.bodyLines, funcInfo.internalVar);
            moves.push(...bodyMoves);
            console.log('[parseMovesFromCode] Inlined', bodyMoves.length,
              'moves from function', funcName, 'for variable', variableName);
          }
        }

        // Now add the variable's own direct moves from top-level code
        // (skip lines inside function bodies)
        if (variableName) {
          // Collect only top-level lines (not inside any def block)
          const topLevelLines = [];
          let insideFunc = false;
          let funcDefIndent = 0;
          for (const line of allLines) {
            const trimmed = line.trim();
            const defMatch = trimmed.match(/^def\s+\w+\s*\(/);
            if (defMatch) {
              insideFunc = true;
              funcDefIndent = line.search(/\S/);
              continue;
            }
            if (insideFunc) {
              const lineIndent = line.search(/\S/);
              if (trimmed.length > 0 && lineIndent <= funcDefIndent) {
                insideFunc = false;
                // This line is top-level, fall through
              } else {
                continue; // skip function body line
              }
            }
            topLevelLines.push(trimmed);
          }

          const directMoves = extractMovesFromLines(topLevelLines, variableName);
          moves.push(...directMoves);
        } else {
          // No variable specified, parse all moves (legacy behavior)
          const allMoves = extractMovesFromLines(allLines, null);
          moves.push(...allMoves);
        }

        return moves;
      }

      // ── Per-variable animation system ──
      // Each variable has its own fully independent animation state.
      // No shared globals — all state lives in variableStates[varName].
      let scenes = {};           // map: variableName -> a-scene element
      let variableStates = {};   // map: variableName -> state object
      let currentVariableName = null;
      let lastMovesSignatures = {};

      const ANIM_CONSTS = { MOVE_DUR: 3000, INTERVAL: 1000, STAY_DUR: 3000 };

      const AXIS_MAP = {
        pivot1: 'rotY', pivot2: 'rotZ', pivot3: 'rotZ',
        pivot4: 'rotY', pivot5: 'rotZ'
      };
      const PRESET_BASE = {
        pivot1: { rotX: 0, rotY: 0, rotZ: 0 },
        pivot2: { rotX: -90, rotY: 0, rotZ: -90 },
        pivot3: { rotX: 0, rotY: 0, rotZ: 0 },
        pivot4: { rotX: 0, rotY: 0, rotZ: 0 },
        pivot5: { rotX: -90, rotY: 0, rotZ: 0 }
      };

      function getVariableState(variableName) {
        if (!variableStates[variableName]) {
          variableStates[variableName] = {
            moveIndex: 0,
            animationTimer: null,
            moveStartTime: null,
            pausedState: null,
            pivots: null,
            scene: null,
            progressEl: null,
            progressLabel: null,
            progressFill: null,
            rafId: null,          // requestAnimationFrame id for progress bar
            phase: null,          // 'move' | 'interval' | 'stay' | null
            phaseStart: null,     // timestamp when current phase started
            phaseDuration: null   // duration of current phase in ms
          };
        }
        return variableStates[variableName];
      }

      function getMovesSignature(variableName) {
        const moves = parseMovesFromCode(variableName);
        if (moves.length === 0) return 'empty';
        return JSON.stringify(moves.map(m => ({ type: m.type, A1: m.Axis1, A2: m.Axis2, A3: m.Axis3, A4: m.Axis4, A5: m.Axis5 })));
      }

      // ── Progress bar helpers ──
      function tickProgress(varName) {
        const st = getVariableState(varName);
        if (!st.phase || !st.phaseStart || !st.progressFill || !st.progressLabel) return;
        const now = Date.now();
        const elapsed = now - st.phaseStart;
        const dur = st.phaseDuration || 1;
        const frac = Math.min(elapsed / dur, 1);
        const elSec = (elapsed / 1000).toFixed(1);
        const durSec = (dur / 1000).toFixed(1);

        st.progressFill.style.width = (frac * 100) + '%';

        if (st.phase === 'move') {
          st.progressFill.style.background = '#4CAF50';
          st.progressLabel.textContent = 'Action ' + st.moveDisplay + '  ' + elSec + 's / ' + durSec + 's';
        } else if (st.phase === 'interval') {
          st.progressFill.style.background = '#FF9800';
          st.progressLabel.textContent = 'Interval  ' + elSec + 's / ' + durSec + 's';
        } else if (st.phase === 'stay') {
          st.progressFill.style.background = '#2196F3';
          st.progressLabel.textContent = 'Reset  ' + elSec + 's / ' + durSec + 's';
        }

        if (frac < 1) {
          st.rafId = requestAnimationFrame(function() { tickProgress(varName); });
        }
      }

      function startPhase(varName, phase, duration, moveDisplay) {
        const st = getVariableState(varName);
        if (st.rafId) { cancelAnimationFrame(st.rafId); st.rafId = null; }
        st.phase = phase;
        st.phaseStart = Date.now();
        st.phaseDuration = duration;
        st.moveDisplay = moveDisplay || '';
        if (st.progressEl) st.progressEl.style.display = '';
        st.rafId = requestAnimationFrame(function() { tickProgress(varName); });
      }

      function stopProgress(varName) {
        const st = getVariableState(varName);
        if (st.rafId) { cancelAnimationFrame(st.rafId); st.rafId = null; }
        st.phase = null;
        if (st.progressFill) st.progressFill.style.width = '0%';
        if (st.progressLabel) st.progressLabel.textContent = '';
      }

      // ── Core animation -- fully self-contained per variable ──
      function startVarAnimation(varName, resumeFrom) {
        const st = getVariableState(varName);
        const scene = st.scene;
        if (!scene) return;

        if (st.animationTimer) { clearTimeout(st.animationTimer); st.animationTimer = null; }
        stopProgress(varName);

        const moves = parseMovesFromCode(varName);
        if (moves.length === 0) {
          if (st.progressEl) st.progressEl.style.display = 'none';
          return;
        }

        // Get pivots from THIS variable's scene
        if (!st.pivots) {
          st.pivots = {};
          for (let i = 1; i <= 5; i++) {
            st.pivots['pivot' + i] = scene.querySelector('#pivot' + i);
          }
        }
        const pivots = st.pivots;

        function applyAxisState(axisValues, durationMs) {
          st.moveStartTime = Date.now();
          for (const pivotId of Object.keys(AXIS_MAP)) {
            const pivot = pivots[pivotId];
            if (!pivot) continue;
            const axis = AXIS_MAP[pivotId];
            const base = PRESET_BASE[pivotId];
            const axisNum = pivotId.slice(-1);
            const offset = axisValues['Axis' + axisNum] || 0;
            const targetRot = axis === 'rotY'
              ? `${base.rotX} ${base.rotY + offset} ${base.rotZ}`
              : `${base.rotX} ${base.rotY} ${base.rotZ + offset}`;
            pivot.setAttribute('animation',
              `property: rotation; to: ${targetRot}; dur: ${durationMs}; easing: easeInOutQuad`);
          }
        }

        function resetToHome() {
          for (const pivotId of Object.keys(AXIS_MAP)) {
            const pivot = pivots[pivotId];
            if (!pivot) continue;
            const base = PRESET_BASE[pivotId];
            pivot.removeAttribute('animation');
            pivot.setAttribute('rotation', `${base.rotX} ${base.rotY} ${base.rotZ}`);
          }
        }

        function runSequence() {
          if (st.moveIndex >= moves.length) {
            // All done -- show reset countdown, then loop
            startPhase(varName, 'stay', ANIM_CONSTS.STAY_DUR);
            st.animationTimer = setTimeout(function() {
              resetToHome();
              st.moveIndex = 0;
              st.animationTimer = setTimeout(runSequence, 100);
            }, ANIM_CONSTS.STAY_DUR);
            return;
          }

          // Move phase
          const move = moves[st.moveIndex];
          const label = (st.moveIndex + 1) + '/' + moves.length;
          startPhase(varName, 'move', ANIM_CONSTS.MOVE_DUR, label);
          applyAxisState(move, ANIM_CONSTS.MOVE_DUR);
          st.moveIndex++;

          // After move completes -> interval phase -> next move
          st.animationTimer = setTimeout(function() {
            startPhase(varName, 'interval', ANIM_CONSTS.INTERVAL);
            st.animationTimer = setTimeout(runSequence, ANIM_CONSTS.INTERVAL);
          }, ANIM_CONSTS.MOVE_DUR);
        }

        // Resume from paused state
        if (resumeFrom && resumeFrom.elapsedInMove < ANIM_CONSTS.MOVE_DUR
            && resumeFrom.moveIndex < moves.length) {
          const resumeMove = moves[resumeFrom.moveIndex];
          const frac = resumeFrom.elapsedInMove / ANIM_CONSTS.MOVE_DUR;
          const remaining = ANIM_CONSTS.MOVE_DUR - resumeFrom.elapsedInMove;

          for (const pivotId of Object.keys(AXIS_MAP)) {
            const pivot = pivots[pivotId];
            if (!pivot) continue;
            const axis = AXIS_MAP[pivotId];
            const base = PRESET_BASE[pivotId];
            const axisNum = pivotId.slice(-1);
            const offset = resumeMove['Axis' + axisNum] || 0;
            if (axis === 'rotY') {
              const cur = base.rotY + offset * frac;
              pivot.setAttribute('rotation', `${base.rotX} ${cur} ${base.rotZ}`);
              pivot.setAttribute('animation',
                `property: rotation; to: ${base.rotX} ${base.rotY + offset} ${base.rotZ}; dur: ${remaining}; easing: easeInOutQuad`);
            } else {
              const cur = base.rotZ + offset * frac;
              pivot.setAttribute('rotation', `${base.rotX} ${base.rotY} ${cur}`);
              pivot.setAttribute('animation',
                `property: rotation; to: ${base.rotX} ${base.rotY} ${base.rotZ + offset}; dur: ${remaining}; easing: easeInOutQuad`);
            }
          }
          st.moveIndex = resumeFrom.moveIndex + 1;
          st.moveStartTime = Date.now() - resumeFrom.elapsedInMove;
          // Resume progress bar mid-phase
          st.phase = 'move';
          st.phaseStart = Date.now() - resumeFrom.elapsedInMove;
          st.phaseDuration = ANIM_CONSTS.MOVE_DUR;
          st.moveDisplay = (resumeFrom.moveIndex + 1) + '/' + moves.length;
          if (st.progressEl) st.progressEl.style.display = '';
          st.rafId = requestAnimationFrame(function() { tickProgress(varName); });

          st.animationTimer = setTimeout(function() {
            startPhase(varName, 'interval', ANIM_CONSTS.INTERVAL);
            st.animationTimer = setTimeout(runSequence, ANIM_CONSTS.INTERVAL);
          }, remaining);
          return;
        }

        // Normal start
        st.animationTimer = setTimeout(runSequence, 500);
      }

      function pauseVarAnimation(varName) {
        if (!varName) return;
        const st = getVariableState(varName);
        const now = Date.now();
        const elapsed = st.moveStartTime ? (now - st.moveStartTime) : 0;
        const moves = parseMovesFromCode(varName);
        const animIdx = (st.moveIndex > 0 && st.moveIndex <= moves.length) ? (st.moveIndex - 1) : null;

        if (st.animationTimer) { clearTimeout(st.animationTimer); st.animationTimer = null; }
        stopProgress(varName);
        if (st.progressEl) st.progressEl.style.display = 'none';

        // Stop A-Frame animations on pivots
        if (st.pivots) {
          for (const pivotId of Object.keys(st.pivots)) {
            const pivot = st.pivots[pivotId];
            if (pivot) pivot.removeAttribute('animation');
          }
        }

        if (animIdx !== null && elapsed < ANIM_CONSTS.MOVE_DUR) {
          st.pausedState = { moveIndex: animIdx, elapsedInMove: elapsed };
        } else {
          st.pausedState = null;
        }
      }

      function resumeVarAnimation(varName) {
        const st = getVariableState(varName);
        startVarAnimation(varName, st.pausedState);
      }

      function handleViewTabClick(btn) {
        const view = btn.dataset.view;

        // Update active state
        document.querySelectorAll('.view-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (view === 'workspace') {
          workspaceArea.style.display = 'flex';
          workspaceArea.classList.remove('hidden');
          modelArea.classList.remove('visible');
          console.log('[View] Switched to Blockly workspace');
          // Pause the current variable's animation
          if (currentVariableName) pauseVarAnimation(currentVariableName);
          // Fix: Blockly needs resize after container was hidden
          if (typeof getWorkspace === 'function' && typeof Blockly !== 'undefined') {
            Blockly.svgResize(getWorkspace());
          }
        } else if (view.startsWith('var:')) {
          // Variable tab - show model area
          workspaceArea.style.display = 'none';
          workspaceArea.classList.add('hidden');
          modelArea.classList.add('visible');

          const variableName = view.slice(4);
          console.log('[View] Switched to Model view for:', variableName);

          // Pause previous variable's animation (if different)
          if (currentVariableName && currentVariableName !== variableName) {
            pauseVarAnimation(currentVariableName);
          }
          currentVariableName = variableName;

          // Check if moves have changed
          const currentSig = getMovesSignature(variableName);
          const lastSig = lastMovesSignatures[variableName];
          const movesChanged = (currentSig !== lastSig);
          lastMovesSignatures[variableName] = currentSig;

          // Ensure scene exists (lazy create)
          const scene = createModelScene(variableName);

          // Hide all scenes + progress bars, show only this one
          for (const vname of Object.keys(scenes)) {
            scenes[vname].style.display = (vname === variableName) ? 'block' : 'none';
            const vst = getVariableState(vname);
            if (vst.progressEl) vst.progressEl.style.display = (vname === variableName) ? '' : 'none';
          }

          if (movesChanged) {
            console.log('[Animation] Moves changed for:', variableName, '- resetting');
            const st = getVariableState(variableName);
            st.moveIndex = 0;
            st.pausedState = null;

            // Reset pivots to home
            const pivots = st.pivots || {};
            for (const pivotId of Object.keys(AXIS_MAP)) {
              const pivot = pivots[pivotId] || scene.querySelector('#' + pivotId);
              if (pivot) {
                const base = PRESET_BASE[pivotId];
                pivot.removeAttribute('animation');
                pivot.setAttribute('rotation', `${base.rotX} ${base.rotY} ${base.rotZ}`);
              }
            }
            startVarAnimation(variableName, null);
          } else {
            console.log('[Animation] Resuming for:', variableName);
            resumeVarAnimation(variableName);
          }

          setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 100);
        }
      }

      // Expose updateRobotTabs for external call
      window.updateRobotTabs = updateRobotTabs;

      // Observe #code-preview for changes and update tabs
      const codePreviewEl = document.getElementById('code-preview');
      if (codePreviewEl) {
        const observer = new MutationObserver(() => {
          updateRobotTabs();
        });
        observer.observe(codePreviewEl, { childList: true, characterData: true, subtree: true });
      }

      // Initial scan
      setTimeout(updateRobotTabs, 500);

      // Initial debug
      console.log('[Init] View tabs ready. Dynamic robot tabs enabled.');
      console.log('[Init] Model area border: ORANGE (debug mode)');

      // A-Frame loaded callback
      document.addEventListener('aframeReady', () => {
        console.log('[A-Frame] aframeReady event fired');
      });

      // Check A-Frame loading
      if (typeof AFRAME !== 'undefined') {
        console.log('[A-Frame] AFRAME global exists, version:', AFRAME.version || 'unknown');

        // Wait for any robot model scene to be ready (scenes have ids like model-scene-robot1)
        document.addEventListener('DOMContentLoaded', () => {
          const scenes = document.querySelectorAll('[id^="model-scene-"]');
          scenes.forEach(scene => {
            scene.addEventListener('loaded', () => {
              console.log('[A-Frame] Scene loaded event fired for:', scene.id);
              console.log('[A-Frame] Scene ready:', scene.id);
            });
          });
        });
      } else {
        console.warn('[A-Frame] AFRAME not yet loaded');
      }
    })();
  </script>
</body>
</html>
